<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/fantasque-sans-mono" type="text/css" />
  <style>
    /*@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap');*/


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dead: #ffffff;
  --alive: #0a0a0a;
  --grid-line: #e8e8e8;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--dead);
  cursor: crosshair;
}

#canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
}

#hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

#name {
  position: absolute;
  top: 28px; left: 32px;
  font-family: 'FantasqueSansMonoRegular', 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 4vw, 52px);
  font-weight: bold;
  letter-spacing: 0.08em;
  color: var(--alive);
  line-height: 1;
  mix-blend-mode: multiply;
  filter: contrast(0.2);
}

#role {
  position: absolute;
  top: calc(28px + clamp(28px, 4vw, 52px) + 6px);
  left: 34px;
  font-family: 'FantasqueSansMonoRegular', 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.18em;
  color: #888;
  text-transform: uppercase;
  filter: contrast(0.1);
}

#nav {
  position: absolute;
  top: 32px; right: 32px;
  display: flex;
  gap: 28px;
  pointer-events: auto;
}

#nav a {
  font-family: 'FantasqueSansMonoRegular', 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #aaa;
  text-decoration: none;
  transition: color 0.2s;
}

#nav a:hover { color: var(--alive); }

#nav a:not(:first-child)::before {
    content: "•";
    padding: 0 14px;
}

#nav-toggle {
  display: none;
  background: none;
  border: 1px solid #d0d0d0;
  cursor: pointer;
  padding: 7px 9px;
  flex-direction: column;
  gap: 4px;
  pointer-events: auto;
  z-index: 100;
  position: relative;
}

#nav-toggle span {
  display: block;
  width: 18px; height: 1.5px;
  background: #666;
  transition: transform 0.25s, opacity 0.25s;
  transform-origin: center;
}

#nav-toggle.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
#nav-toggle.open span:nth-child(2) { opacity: 0; }
#nav-toggle.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

#nav-drawer {
  display: none;
  position: absolute;
  top: 0; right: 0;
  width: 100vw;
  background: #00000044;
  backdrop-filter: blur(8px);
  flex-direction: column;
  align-items: flex-end;
  padding: 80px 32px 36px;
  gap: 24px;
  pointer-events: auto;
  transform: translateY(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}

#nav-drawer.open {
  transform: translateY(0);
}

#nav-drawer a {
  font-family: 'FantasqueSansMonoRegular', 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #eee;
  text-decoration: none;
  transition: color 0.2s;
}

#nav-drawer a:hover { color: var(--dead); }

.hud-label {
  position: absolute;
  font-family: 'FantasqueSansMonoRegular', 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: #bbb;
  text-transform: uppercase;
}

#status { bottom: 28px; left: 32px; }
#gen    { bottom: 28px; right: 32px; }

#controls {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  pointer-events: auto;
}

.ctrl-btn {
  font-family: 'FantasqueSansMonoRegular', 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: none;
  border: 1px solid #d0d0d0;
  color: #aaa;
  padding: 6px 14px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background-color 0.2s;
}

.ctrl-btn:hover {
  border-color: var(--alive);
  color: var(--alive);
}

.ctrl-btn.active {
  background: var(--alive);
  color: var(--dead);
  border-color: var(--alive);
}

#fab-wrap {
  display: none;
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  flex-direction: column;
  align-items: center;
  gap: 12px;
  pointer-events: none;
  z-index: 20;
}

#fab-tray {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: opacity 0.22s ease, transform 0.22s ease;
}

#fab-tray.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.fab-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.fab-label {
  font-family: 'FantasqueSansMonoRegular', 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #666;
  background: rgba(255,255,255,0.92);
  border: 1px solid #e0e0e0;
  padding: 4px 10px;
  white-space: nowrap;
  backdrop-filter: blur(4px);
  pointer-events: auto;
}

.fab-btn {
  border-radius: 50%;
  border: 1px solid #d0d0d0;
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s;
  pointer-events: auto;
}

.fab-btn svg {
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.fab-action {
  width: 40px; height: 40px;
}

.fab-action svg { width: 16px; height: 16px; stroke: #888; }
.fab-action:hover { border-color: var(--alive); background-color: #f5f5f5; }
.fab-action.active { background-color: var(--alive); border-color: var(--alive); }
.fab-action.active svg { stroke: #fff; }

#fab-main {
  width: 48px; height: 48px;
  border-width: 1.5px;
  border-color: #c0c0c0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

#fab-main svg { width: 18px; height: 18px; stroke: #555; transition: transform 0.3s; }
#fab-main:hover { border-color: var(--alive); }
#fab-main.open { border-color: var(--alive); box-shadow: 0 2px 16px rgba(0,0,0,0.13); }
#fab-main.open svg { transform: rotate(45deg); }

@media (max-width: 600px) {
  #nav-links { display: none; }
  #nav-toggle { display: flex; }
  #nav-drawer { display: flex; }

  #controls { display: none; }
  #fab-wrap  { display: flex; }

  #status { display: none; }

  /* bottom: 90px clears the fixed FAB sitting above this element */
  #gen { right: 50%; transform: translateX(50%); bottom: 90px; }
}

@media (prefers-color-scheme: dark) {
  :root {
    --dead: #1a1a1a;
    --alive: #ebebeb;
    --grid-line: #262626;
  }

  #role { color: #666; }
  #nav a { color: #666; }
  #nav-toggle { border-color: #363636; }
  #nav-toggle span { background: #999; }
  #nav-drawer a:hover { color: var(--alive); }
  .hud-label { color: #555; }
  .ctrl-btn { color: #666; border-color: #363636; }
  .fab-label { color: #888; background: rgba(26,26,26,0.92); border-color: #363636; }
  .fab-btn { background: #242424; border-color: #363636; }
  .fab-action svg { stroke: #888; }
  .fab-action:hover { background-color: #2e2e2e; }
  #fab-main { border-color: #404040; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  #fab-main svg { stroke: #999; }
  #fab-main.open { box-shadow: 0 2px 16px rgba(0,0,0,0.5); }
}

  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="name"></div>
  <div id="role"></div>

  <nav id="nav">
    <button id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div id="nav-links"></div>
  </nav>

  <div id="nav-drawer" aria-hidden="true"></div>

  <div id="status" class="hud-label">Click to draw &nbsp;·&nbsp; Space to pause</div>
  <div id="gen" class="hud-label">Gen <span id="gen-count">0</span></div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-clear">Clear</button>
    <button class="ctrl-btn" id="btn-random">Random</button>
    <button class="ctrl-btn active" id="btn-pause">Running</button>
  </div>

  <div id="fab-wrap">
    <div id="fab-tray">
      <div class="fab-item">
        <span id="fab-clear-label" class="fab-label">Clear</span>
        <button class="fab-btn fab-action" id="fab-clear" aria-labelledby="fab-clear-label">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>
      <div class="fab-item">
        <span id="fab-random-label" class="fab-label">Random</span>
        <button class="fab-btn fab-action" id="fab-random" aria-labelledby="fab-random-label">
          <svg viewBox="0 0 24 24"><path d="M18 4l3 3-3 3M6 7h15M6 20l-3-3 3-3M18 17H3M7 4l-3 3 3 3"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
      <div class="fab-item">
        <span class="fab-label" id="fab-pause-label">Running</span>
        <button class="fab-btn fab-action active" id="fab-pause" aria-labelledby="fab-pause-label">
          <svg id="fab-pause-icon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
      </div>
    </div>

    <button class="fab-btn" id="fab-main" aria-label="Controls">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

  </div>
</div>

<script id="config" type="application/json">
{
  "name":       "Dakota Wisdom Lorance",
  "role":       "I write code. Sometimes it works.",
  "pageTitle":  "dwl.dev",
  "nav": [
    {"label": "GitHub","href": "https://github.com/slyboots/"},
    {"label": "Twitch","href": "https://twitch.tv/likethestates/home"},
    {"label": "LinkedIn","href": "https://www.linkedin.com/in/dakota-wisdom-lorance"}
  ],
  "cellSize":        20,
  "tickInterval":    1500,
  "randomFillRatio": 0.15
}
</script>
<script>
    (() => {
        const $ = (id) => document.getElementById(id);
        const cfg = JSON.parse($("config").textContent);

        document.title = cfg.pageTitle;
        $("name").textContent = cfg.name;
        $("role").textContent = cfg.role;

        // Build nav + drawer links
        const navLinks = $("nav-links");
        const navDrawer = $("nav-drawer");
        cfg.nav.forEach(({ label, href }) => {
            const a1 = document.createElement("a");
            a1.href = href;
            a1.textContent = label;
            navLinks.appendChild(a1);

            const a2 = document.createElement("a");
            a2.href = href;
            a2.textContent = label;
            navDrawer.appendChild(a2);
        });

        const canvas = $("canvas");
        const ctx = canvas.getContext("2d");

        const btnPause = $("btn-pause");
        const btnClear = $("btn-clear");
        const btnRandom = $("btn-random");
        const genEl = $("gen-count");

        const fabMain = $("fab-main");
        const fabTray = $("fab-tray");
        const fabPauseBtn = $("fab-pause");
        const fabPauseLabel = $("fab-pause-label");
        const fabPauseIcon = $("fab-pause-icon");

        const navToggle = $("nav-toggle");

        const CELL = cfg.cellSize || 20;
        const TICK_MS = cfg.tickInterval || 2000;
        const FILL = cfg.randomFillRatio ?? 0.25;

        let cols = 0;
        let rows = 0;
        let grid = [];
        let next = [];
        let generation = 0;
        let running = true;
        let timer = null;

        let drawing = false;
        let drawValue = 1;

        canvas.style.touchAction = "none"; // pointer events work on mobile without scrolling the page

        function newGrid() {
            return Array.from({ length: rows }, () => new Uint8Array(cols));
        }

        function resize() {
            const old = grid;
            const oldRows = rows;
            const oldCols = cols;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            cols = Math.ceil(canvas.width / CELL);
            rows = Math.ceil(canvas.height / CELL);

            grid = newGrid();
            next = newGrid();

            if (old.length) {
                const rr = Math.min(rows, oldRows);
                const cc = Math.min(cols, oldCols);
                for (let r = 0; r < rr; r++) {
                    for (let c = 0; c < cc; c++) {
                        grid[r][c] = old[r][c];
                    }
                }
            }

            draw();
        }

        function neighbors(r, c) {
            let n = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const rr = (r + dr + rows) % rows;
                    const cc = (c + dc + cols) % cols;
                    n += grid[rr][cc];
                }
            }
            return n;
        }

        function tick() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const alive = grid[r][c] === 1;
                    const n = neighbors(r, c);
                    next[r][c] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
                }
            }

            const tmp = grid;
            grid = next;
            next = tmp;

            generation++;
            genEl.textContent = String(generation);
            draw();
        }

        function startLoop() {
            clearInterval(timer);
            timer = setInterval(() => {
                if (running) tick();
            }, TICK_MS);
        }

        function draw() {
            const css = getComputedStyle(document.documentElement);
            const gridLine = css.getPropertyValue("--grid-line").trim();
            const aliveColor = css.getPropertyValue("--alive").trim();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // grid lines
            ctx.strokeStyle = gridLine;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            for (let c = 0; c <= cols; c++) {
                const x = c * CELL;
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
            }
            for (let r = 0; r <= rows; r++) {
                const y = r * CELL;
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();

            // live cells
            ctx.fillStyle = aliveColor;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!grid[r][c]) continue;
                    ctx.fillRect(c * CELL + 0.5, r * CELL + 0.5, CELL - 1, CELL - 1);
                }
            }
        }

        function xyToCell(x, y) {
            return {
                r: Math.floor(y / CELL),
                c: Math.floor(x / CELL),
            };
        }

        function paint(x, y) {
            const { r, c } = xyToCell(x, y);
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            grid[r][c] = drawValue;
            draw();
        }

        function setRunning(on) {
            running = on;
            const label = running ? "Running" : "Paused";

            btnPause.textContent = label;
            btnPause.classList.toggle("active", running);

            fabPauseLabel.textContent = label;
            fabPauseBtn.classList.toggle("active", running);

            fabPauseIcon.innerHTML = running
                ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
                : '<polygon points="5,3 19,12 5,21"/>';
        }

        function togglePause() {
            setRunning(!running);
        }

        function resetGen() {
            generation = 0;
            genEl.textContent = "0";
        }

        function clearAll() {
            grid = newGrid();
            next = newGrid();
            resetGen();
            draw();
        }

        function randomize() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    grid[r][c] = Math.random() < FILL ? 1 : 0;
                }
            }
            resetGen();
            draw();
        }

        function closeFab() {
            fabTray.classList.remove("open");
            fabMain.classList.remove("open");
        }

        function closeNav() {
            navDrawer.classList.remove("open");
            navToggle.classList.remove("open");
            navDrawer.setAttribute("aria-hidden", "true");
        }

        // Pointer drawing (mouse + touch)
        canvas.addEventListener("pointerdown", (e) => {
            const { r, c } = xyToCell(e.clientX, e.clientY);
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            drawValue = grid[r][c] ? 0 : 1;
            drawing = true;
            paint(e.clientX, e.clientY);
        });

        canvas.addEventListener("pointermove", (e) => {
            if (!drawing) return;
            paint(e.clientX, e.clientY);
        });

        window.addEventListener("pointerup", () => {
            drawing = false;
        });

        window.addEventListener("keydown", (e) => {
            if (e.code !== "Space") return;
            e.preventDefault();
            togglePause();
        });

        btnPause.addEventListener("click", togglePause);
        btnClear.addEventListener("click", clearAll);
        btnRandom.addEventListener("click", randomize);

        $("fab-clear").addEventListener("click", () => {
            clearAll();
            closeFab();
        });

        $("fab-random").addEventListener("click", () => {
            randomize();
            closeFab();
        });

        $("fab-pause").addEventListener("click", togglePause);

        fabMain.addEventListener("click", () => {
            closeNav();
            const open = fabTray.classList.toggle("open");
            fabMain.classList.toggle("open", open);
        });

        navToggle.addEventListener("click", () => {
            const open = navDrawer.classList.toggle("open");
            navToggle.classList.toggle("open", open);
            navDrawer.setAttribute("aria-hidden", String(!open));
            closeFab();
        });

        navDrawer.querySelectorAll("a").forEach((a) => {
            a.addEventListener("click", closeNav);
        });

        window.addEventListener("resize", resize);
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", draw);

        resize();
        randomize();
        startLoop();
        setRunning(true);
    })();
</script>

</body>
</html>
